project:
  name: example_pipeline
  random_seed: 42

paths:
  raw_data_dir: data/raw
  interim_data_dir: data/interim
  processed_data_dir: data/processed
  models_dir: models
  forecasts_dir: output/forecasts

data:
  main_table: bin_timeseries.parquet
  weather_table: weather.parquet
  calendar_table: calendar.parquet

model:
  type: xgboost
  params:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8

training:
  target_horizon_hours: 24
  train_start: "2021-01-01"
  train_end: "2024-06-30"
  val_start: "2024-07-01"
  val_end: "2024-12-31"

forecasting:
  threshold_fill_level: 0.7
